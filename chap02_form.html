<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!--
    form 태그는 여러개의 input을 묶어서 한꺼번에 전송할 때 묶는 역할을 하는데,
    2가지 방식으로 전달이 가능함
    1. GET 방식
        - 주소줄에 내용을 전달하는 방식 (보안에 취약)
    2. POST 방식
        - 주소줄에 내용을 전달하지 않고, body에 내용을 전달하는 방식 (보안이 필요한 내용, 민감한 정보)
-->

<h1>GET 방식</h1>
<form method="get" action="https://postman-echo.com/get"><br />
    <label>이름:<input type="text" name="name" /></label><br />
    <label>이메일:<input type="email" name="email" /></label><br />
    <lavel>비밀번호:<input type="password" name="password" /></lavel><br />
    <button type="button">전송</button>
    <!--
    button : 동작만 하는 버튼
    submit : 전송되는 버튼 (기본값)
    -->
</form>

<h1>POST 방식</h1>
<form method="post" action="https://postman-echo.com/post"><br />
    <label>이름:<input type="text" name="name" /></label><br />
    <label>이메일:<input type="email" name="email" /></label><br />
    <lavel>비밀번호:<input type="password" name="password" /></lavel><br />
    <button>전송</button>
</form>
</body>
</html>
