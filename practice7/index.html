<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>
<body>
<div class="container">
    <aside class="sideBar">
        <div class="logo">
            <i class="fa-solid fa-cube brand-icon"></i>
            <h2>MyDash</h2>
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-item active">
                <i class="fa-regular fa-id-badge"></i>
                <span>Profile Info</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Account Security</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-regular fa-bell"></i>
                <span>Notifications</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-regular fa-credit-card"></i>
                <span>Billing Details</span>
            </a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="top-header">
            <div class="header-text">
                <h2>Profile Information</h2>
                <p>Update your photo and personal detail</p>
            </div>
            <div class="user-shortcut">
                <i class="fa-solid fa-magnifying-glass"></i>
                <div class="user-avatar-small">A</div>
            </div>
        </header>
        <div class="content-wrapper">
            <div class="user-card">
                <div class="user-profile">
                    <div class="user-avatar">A</div>
                    <div class="up-btn">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Upload</span>
                    </div>
                    <div class="remove-btn">
                        <i class="fa-solid fa-trash-can"></i>
                        <span>Remove</span>
                    </div>
                </div>
                <div class="user-details">
                    <form method="get" action="https://postman-echo.com/post">
                        <div class="user-name">
                            <div>
                                <label class="inputBar">
                                    <span class="font">First name</span>
                                    <input class="input-box" type="text" name="firstname" placeholder="First name" />
                                </label>
                            </div>
                            <div>
                                <label class="inputBar">
                                    <span class="font">Last name</span>
                                    <input class="input-box" type="text" name="lastname" placeholder="Last name" />
                                </label>
                            </div>
                        </div>
                        <label class="inputBar">
                            <span class="font">Email Address</span>
                            <input class="input-box" type="email" name="email" placeholder="Email" />
                        </label>
                        <label class="inputBar">
                            <span class="font">Phone Number</span>
                            <input class="input-box" type="tel" name="tel" placeholder="Phone Number" />
                        </label>
                    </form>
                    <div></div>
                </div>
                <div class="post-btn"></div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
